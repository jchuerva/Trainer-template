name: Generate Yearly Report (January)

on:
  schedule:
    # 1 January at 06:00 UTC — generates the PREVIOUS year's definitive report
    - cron: '0 6 1 1 *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to generate (default: previous year)'
        required: false
        default: ''

jobs:
  generate-yearly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Determine year
        id: year
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            echo "year=${{ github.event.inputs.year }}" >> $GITHUB_OUTPUT
          else
            echo "year=$(date -d 'last year' +%Y)" >> $GITHUB_OUTPUT
          fi

      - name: Generate health charts (monthly + daily trend)
        run: |
          YEAR=${{ steps.year.outputs.year }}
          python3 scripts/generate_health_charts.py --days 365 --output health/charts/
          python3 scripts/generate_health_charts.py \
            --days 365 \
            --output health/yearly/charts/${YEAR}/daily \
            --month-labels

      - name: Generate definitive yearly report
        run: python3 scripts/generate_yearly_report.py --year ${{ steps.year.outputs.year }} --final

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health/yearly/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "report: generate definitive ${{ steps.year.outputs.year }} yearly report [skip ci]"
            git push
          fi
