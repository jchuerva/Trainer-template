name: Sync Config to Templates

on:
  push:
    branches:
      - main
    paths:
      - 'config/config.yaml'
  workflow_dispatch:
    # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  sync-templates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate config/config.yaml
        run: python scripts/validate_config.py

      - name: Run setup.py to sync templates
        run: python scripts/setup.py

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain templates/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push template updates
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add templates/
          git commit -m "Sync templates with config/config.yaml changes"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## 🔄 Config Sync" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.has_changes }}" == "true" ]; then
            echo "✅ Templates updated and committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No template changes needed" >> $GITHUB_STEP_SUMMARY
          fi
