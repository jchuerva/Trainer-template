name: Update Health Index and Charts

on:
  push:
    branches: [main]
    paths:
      - 'health/daily/**/*.json'
  workflow_dispatch: {}

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Generate health charts (90 days)
        run: python3 scripts/generate_health_charts.py --days 90

      - name: Regenerate health/index.md
        run: python3 scripts/build_health_index.py

      - name: Update yearly report
        run: python3 scripts/generate_yearly_report.py --year $(date +%Y)

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health/index.md health/charts/ health/yearly/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: regenerate health index and charts [skip ci]"
            git push
          fi
