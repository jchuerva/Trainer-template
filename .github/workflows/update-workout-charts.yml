name: Update Workout Charts

on:
  push:
    branches: [main]
    paths:
      - 'workouts/**'
  workflow_dispatch: {}

jobs:
  update-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Generate workout heatmap
        run: python3 scripts/generate_workout_heatmap.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workouts/charts/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: regenerate workout charts [skip ci]"
            git push
          fi
