name: Update Yearly Report (Monthly)

on:
  schedule:
    # 1st of each month at 07:00 UTC — updates the current year's in-progress report
    - cron: '0 7 1 * *'
  workflow_dispatch:

jobs:
  update-yearly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Generate health charts (monthly + daily trend)
        run: |
          YEAR=$(date +%Y)
          # Monthly aggregated charts
          python3 scripts/generate_health_charts.py --days 365 --output health/charts/
          # Day-by-day charts for yearly report (month labels on X axis)
          python3 scripts/generate_health_charts.py \
            --days 365 \
            --output health/yearly/charts/${YEAR}/daily \
            --month-labels

      - name: Update current year report
        run: python3 scripts/generate_yearly_report.py --year $(date +%Y)

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health/yearly/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "report: update $(date +%Y) yearly report [skip ci]"
            git push
          fi
